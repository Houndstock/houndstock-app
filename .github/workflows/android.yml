name: Android CI

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'

# Cancel in-progress runs when a new push lands on the same ref.
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

# Opt every JS action into Node 24 ahead of the June 16 2026 forced upgrade.
# Safe to remove once Node 24 is the runner default and every action we use
# ships a release that targets it.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build, lint, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Lint (debug)
        run: gradle :app:lintDebug --stacktrace

      - name: Unit tests
        run: gradle :app:testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14
